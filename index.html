<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHS Peer Review Assessment Platform 2026</title>
<style>
:root {
  --ghs-green: #006633;
  --ghs-gold: #FFB800;
  --ghs-dark: #003d1f;
  --ghs-light: #e8f5ee;
  --accent: #009944;
  --danger: #c0392b;
  --warning: #e67e22;
  --info: #2980b9;
  --white: #ffffff;
  --gray: #6c757d;
  --light-gray: #f8f9fa;
  --border: #dee2e6;
  --shadow: 0 2px 12px rgba(0,0,0,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--light-gray); color: #333; }

/* ====== LOGIN PAGE ====== */
#loginPage {
  min-height: 100vh;
  background: linear-gradient(135deg, var(--ghs-dark) 0%, var(--ghs-green) 60%, var(--accent) 100%);
  display: flex; align-items: center; justify-content: center;
}
.login-card {
  background: white; border-radius: 16px; padding: 40px;
  width: 420px; max-width: 95vw;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  animation: fadeIn 0.5s ease;
}
.login-header { text-align: center; margin-bottom: 28px; }
.login-logo { width: 90px; height: 90px; margin-bottom: 12px; }
.login-header h1 { color: var(--ghs-green); font-size: 1.3rem; font-weight: 700; }
.login-header p { color: var(--gray); font-size: 0.85rem; margin-top: 4px; }
.login-header .year-badge {
  background: var(--ghs-gold); color: var(--ghs-dark);
  padding: 3px 12px; border-radius: 20px; font-size: 0.75rem;
  font-weight: 700; display: inline-block; margin-top: 8px;
}
.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: #444; }
.form-control {
  width: 100%; padding: 11px 14px; border: 2px solid var(--border);
  border-radius: 8px; font-size: 0.95rem; transition: border-color 0.2s;
  outline: none;
}
.form-control:focus { border-color: var(--ghs-green); }
.btn {
  padding: 11px 20px; border: none; border-radius: 8px; cursor: pointer;
  font-size: 0.95rem; font-weight: 600; transition: all 0.2s; text-align: center;
}
.btn-primary { background: var(--ghs-green); color: white; width: 100%; }
.btn-primary:hover { background: var(--ghs-dark); transform: translateY(-1px); }
.btn-secondary { background: var(--border); color: #444; }
.btn-secondary:hover { background: #ccc; }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { background: #a93226; }
.btn-gold { background: var(--ghs-gold); color: var(--ghs-dark); }
.btn-gold:hover { background: #e5a700; }
.btn-sm { padding: 6px 14px; font-size: 0.82rem; }
.btn-xs { padding: 4px 10px; font-size: 0.78rem; }
.err-msg { color: var(--danger); font-size: 0.82rem; margin-top: 8px; text-align: center; }

/* ====== MAIN APP ====== */
#appShell { display: none; min-height: 100vh; flex-direction: column; }

.topbar {
  background: var(--ghs-green);
  color: white; padding: 0 20px;
  display: flex; align-items: center; justify-content: space-between;
  height: 58px; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  position: sticky; top: 0; z-index: 100;
}
.topbar-left { display: flex; align-items: center; gap: 12px; }
.topbar-logo { width: 38px; height: 38px; }
.topbar-title { font-weight: 700; font-size: 1.05rem; }
.topbar-subtitle { font-size: 0.72rem; opacity: 0.8; }
.topbar-right { display: flex; align-items: center; gap: 14px; }
.user-chip {
  background: rgba(255,255,255,0.15); padding: 5px 14px; border-radius: 20px;
  font-size: 0.82rem; cursor: pointer;
}
.role-badge {
  padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 700;
}
.role-superadmin { background: var(--ghs-gold); color: var(--ghs-dark); }
.role-supervisor { background: #3498db; color: white; }
.role-assessor { background: #27ae60; color: white; }
.live-pulse {
  width: 8px; height: 8px; background: #2ecc71; border-radius: 50%;
  animation: pulse 1.5s infinite; display: inline-block;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.5)} }

/* ====== NAV TABS ====== */
.nav-tabs {
  background: var(--ghs-dark); display: flex; overflow-x: auto;
  scrollbar-width: none; gap: 2px; padding: 0 10px;
}
.nav-tabs::-webkit-scrollbar { display: none; }
.nav-tab {
  padding: 12px 18px; color: rgba(255,255,255,0.7); cursor: pointer;
  font-size: 0.85rem; font-weight: 600; white-space: nowrap;
  border-bottom: 3px solid transparent; transition: all 0.2s;
}
.nav-tab:hover { color: white; }
.nav-tab.active { color: var(--ghs-gold); border-bottom-color: var(--ghs-gold); }

.page { display: none; padding: 20px; max-width: 1400px; margin: 0 auto; }
.page.active { display: block; }

/* ====== CARDS ====== */
.card {
  background: white; border-radius: 12px; padding: 20px;
  box-shadow: var(--shadow); margin-bottom: 20px;
}
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px; padding-bottom: 12px; border-bottom: 2px solid var(--ghs-light);
}
.card-title { font-size: 1rem; font-weight: 700; color: var(--ghs-dark); }
.card-icon { font-size: 1.4rem; }

/* ====== KPI GRID ====== */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 20px; }
.kpi-card {
  background: white; border-radius: 12px; padding: 18px;
  box-shadow: var(--shadow); border-left: 4px solid var(--ghs-green);
  transition: transform 0.2s;
}
.kpi-card:hover { transform: translateY(-2px); }
.kpi-card.gold { border-left-color: var(--ghs-gold); }
.kpi-card.blue { border-left-color: var(--info); }
.kpi-card.red { border-left-color: var(--danger); }
.kpi-val { font-size: 2rem; font-weight: 800; color: var(--ghs-green); }
.kpi-card.gold .kpi-val { color: #b8860b; }
.kpi-card.blue .kpi-val { color: var(--info); }
.kpi-card.red .kpi-val { color: var(--danger); }
.kpi-label { font-size: 0.78rem; color: var(--gray); font-weight: 600; margin-top: 4px; }

/* ====== SCORE BADGE ====== */
.score-badge {
  display: inline-block; padding: 4px 12px; border-radius: 20px;
  font-weight: 700; font-size: 0.82rem;
}
.score-high { background: #d4edda; color: #155724; }
.score-med { background: #fff3cd; color: #856404; }
.score-low { background: #f8d7da; color: #721c24; }

/* ====== PROGRESS BAR ====== */
.progress { background: #e9ecef; border-radius: 8px; height: 10px; overflow: hidden; }
.progress-bar {
  height: 100%; border-radius: 8px; transition: width 0.6s ease;
}
.progress-high { background: linear-gradient(90deg, #27ae60, #2ecc71); }
.progress-med { background: linear-gradient(90deg, #e67e22, #f39c12); }
.progress-low { background: linear-gradient(90deg, #c0392b, #e74c3c); }

/* ====== TABLE ====== */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
th { background: var(--ghs-light); color: var(--ghs-dark); font-weight: 700; padding: 10px 12px; text-align: left; }
td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:hover td { background: var(--light-gray); }

/* ====== ASSESSMENT FORM ====== */
.module-header {
  background: linear-gradient(135deg, var(--ghs-green), var(--accent));
  color: white; border-radius: 12px; padding: 20px 24px; margin-bottom: 20px;
}
.module-header h2 { font-size: 1.2rem; }
.module-header .meta { font-size: 0.82rem; opacity: 0.85; margin-top: 6px; }
.progress-summary {
  background: rgba(255,255,255,0.15); border-radius: 8px; padding: 12px 16px;
  margin-top: 14px; display: flex; gap: 20px; flex-wrap: wrap;
}
.prog-item { font-size: 0.85rem; }
.prog-val { font-size: 1.3rem; font-weight: 800; }

.section-block {
  background: white; border-radius: 10px; margin-bottom: 16px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.08); overflow: hidden;
}
.section-title {
  background: var(--ghs-dark); color: var(--ghs-gold);
  padding: 12px 18px; font-weight: 700; font-size: 0.92rem;
  cursor: pointer; display: flex; align-items: center; justify-content: space-between;
}
.section-body { padding: 16px; display: none; }
.section-body.open { display: block; }

.item-row {
  display: grid; grid-template-columns: auto 1fr auto;
  gap: 12px; align-items: start; padding: 12px;
  border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px;
  background: var(--light-gray);
}
.item-no { background: var(--ghs-green); color: white; border-radius: 6px; padding: 4px 8px; font-size: 0.78rem; font-weight: 700; white-space: nowrap; }
.item-info h4 { font-size: 0.88rem; font-weight: 700; color: var(--ghs-dark); margin-bottom: 4px; }
.item-info p { font-size: 0.78rem; color: var(--gray); line-height: 1.4; }
.item-scoring { min-width: 140px; text-align: right; }
.expected-score { font-size: 0.75rem; color: var(--gray); margin-bottom: 6px; }
.score-input {
  width: 90px; padding: 8px 10px; border: 2px solid var(--border);
  border-radius: 8px; font-size: 1rem; font-weight: 700; text-align: center;
  color: var(--ghs-green); transition: border-color 0.2s; outline: none;
}
.score-input:focus { border-color: var(--ghs-green); }
.score-input.over { border-color: var(--danger); background: #fdf3f3; }
.score-input.filled { border-color: var(--accent); background: #f0fff5; }

/* ====== FACILITY SCORECARD ====== */
.scorecard-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px;
}
.module-score-card {
  background: white; border-radius: 10px; padding: 18px; box-shadow: var(--shadow);
  border-top: 4px solid var(--ghs-green);
}
.module-score-card h3 { font-size: 0.88rem; color: var(--ghs-dark); margin-bottom: 12px; }

/* ====== FACILITY CARDS ====== */
.facility-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
.facility-card {
  background: white; border-radius: 12px; padding: 18px; box-shadow: var(--shadow);
  cursor: pointer; transition: all 0.2s; border-left: 5px solid var(--ghs-green);
}
.facility-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
.facility-card.status-high { border-left-color: #27ae60; }
.facility-card.status-med { border-left-color: var(--ghs-gold); }
.facility-card.status-low { border-left-color: var(--danger); }
.facility-name { font-weight: 700; font-size: 1rem; color: var(--ghs-dark); margin-bottom: 8px; }
.facility-meta { font-size: 0.78rem; color: var(--gray); margin-bottom: 12px; }

/* ====== MODAL ====== */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  display: none; align-items: center; justify-content: center; z-index: 1000;
}
.modal-backdrop.open { display: flex; }
.modal {
  background: white; border-radius: 16px; padding: 28px;
  width: 500px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  animation: fadeIn 0.3s ease;
}
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.modal-title { font-size: 1.1rem; font-weight: 700; color: var(--ghs-dark); }
.modal-close { cursor: pointer; font-size: 1.4rem; color: var(--gray); }
.modal-close:hover { color: var(--danger); }

/* ====== CHART ====== */
.chart-bar-wrap { padding: 8px 0; }
.chart-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.chart-label { font-size: 0.75rem; width: 160px; flex-shrink: 0; color: #555; font-weight: 600; }
.chart-track { flex: 1; background: #e9ecef; border-radius: 6px; height: 22px; overflow: hidden; position: relative; }
.chart-fill { height: 100%; border-radius: 6px; transition: width 0.8s ease; display: flex; align-items: center; padding-left: 8px; }
.chart-fill span { font-size: 0.75rem; font-weight: 700; color: white; }
.chart-num { font-size: 0.78rem; font-weight: 700; width: 50px; text-align: right; }

/* ====== TOASTS ====== */
.toast-container { position: fixed; top: 70px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: white; border-radius: 10px; padding: 12px 18px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2); font-size: 0.88rem;
  border-left: 4px solid var(--ghs-green); max-width: 320px;
  animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 10px;
}
.toast.error { border-left-color: var(--danger); }
.toast.warning { border-left-color: var(--warning); }
@keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
@keyframes fadeIn { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }

/* ====== LIVE INDICATOR ====== */
.live-badge {
  background: #d4edda; color: #155724; padding: 3px 10px; border-radius: 20px;
  font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; gap: 5px;
}

/* ====== UTILITY ====== */
.flex { display: flex; }
.flex-center { display: flex; align-items: center; }
.flex-between { display: flex; align-items: center; justify-content: space-between; }
.gap-8 { gap: 8px; }
.gap-12 { gap: 12px; }
.gap-16 { gap: 16px; }
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }
.mb-16 { margin-bottom: 16px; }
.text-sm { font-size: 0.82rem; }
.text-muted { color: var(--gray); }
.text-center { text-align: center; }
.fw-bold { font-weight: 700; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
.select-ctrl {
  padding: 9px 12px; border: 2px solid var(--border); border-radius: 8px;
  font-size: 0.9rem; outline: none; background: white; cursor: pointer;
}
.select-ctrl:focus { border-color: var(--ghs-green); }
.divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--gray); }
.empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
.spinner {
  width: 36px; height: 36px; border: 4px solid var(--border);
  border-top-color: var(--ghs-green); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 20px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ====== COMPLETION RING ====== */
.ring-wrap { display: flex; align-items: center; gap: 14px; }
.ring { position: relative; width: 60px; height: 60px; flex-shrink: 0; }
.ring svg { transform: rotate(-90deg); }
.ring-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.ring-pct { font-size: 0.82rem; font-weight: 800; color: var(--ghs-dark); }

/* ====== Leaderboard ====== */
.lb-row { display: flex; align-items: center; gap: 14px; padding: 12px; border-radius: 10px; margin-bottom: 8px; background: white; box-shadow: 0 1px 5px rgba(0,0,0,0.08); }
.lb-rank { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.9rem; flex-shrink: 0; }
.lb-rank.r1 { background: var(--ghs-gold); color: var(--ghs-dark); }
.lb-rank.r2 { background: #c0c0c0; color: #333; }
.lb-rank.r3 { background: #cd7f32; color: white; }
.lb-rank.other { background: var(--ghs-light); color: var(--ghs-green); }

/* ====== RADAR / SPIDER CHART ====== */
.radar-wrap { display:flex; align-items:center; justify-content:center; padding:10px 0; }
.radar-wrap canvas { max-width:100%; }

/* ====== SCORE INPUT COLOURS ====== */
.score-input.s-excellent { border-color:#27ae60; background:#f0fff5; color:#155724; }
.score-input.s-good      { border-color:#f39c12; background:#fffbf0; color:#856404; }
.score-input.s-poor      { border-color:#e74c3c; background:#fff5f5; color:#721c24; }
.score-input.s-over      { border-color:#c0392b; background:#fdf3f3; color:#721c24; animation:shake 0.3s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }

/* ====== AUTOSAVE STATUS ====== */
.autosave-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-left:6px; }
.autosave-dot.saving  { background:#f39c12; animation:pulse 1s infinite; }
.autosave-dot.saved   { background:#27ae60; }
.autosave-dot.error   { background:#e74c3c; }

/* ====== ITEM ROW COMPLETE STATE ====== */
.item-row.completed { background:#f0fff5; border-color:#a8d5b5; }
.item-row.needs-attention { background:#fff9f0; border-color:#f5c58a; }

/* ====== SECTION SCORE BADGE ====== */
.section-score { font-size:0.75rem; background:rgba(255,255,255,0.15); padding:2px 8px; border-radius:10px; color:#FFB800; }

/* ====== PRINT SCORECARD ====== */
@media print {
  .topbar,.nav-tabs,.btn,.modal-backdrop { display:none !important; }
  .page { display:block !important; }
  body { background:white; }
  .card { box-shadow:none; border:1px solid #ddd; }
}
.print-header { display:none; }
@media print { .print-header { display:block; text-align:center; margin-bottom:20px; } }

/* ====== EXPORT BUTTON ====== */
.btn-export { background:#1a5276; color:white; }
.btn-export:hover { background:#154360; }

/* ====== FACILITY SEARCH ====== */
.search-bar { 
  width:100%; padding:10px 14px; border:2px solid var(--border); border-radius:10px;
  font-size:0.95rem; outline:none; margin-bottom:16px;
}
.search-bar:focus { border-color:var(--ghs-green); }

/* ====== NOTIFICATION BELL ====== */
.notif-count { 
  background:var(--danger); color:white; border-radius:50%; 
  width:18px; height:18px; font-size:0.65rem; display:flex; 
  align-items:center; justify-content:center; position:absolute;
  top:-4px; right:-4px; font-weight:800;
}
.notif-wrap { position:relative; cursor:pointer; font-size:1.2rem; }

/* ====== ASSESSMENT TIMER ====== */
.timer-bar {
  background:var(--ghs-dark); color:white; text-align:center;
  padding:6px; font-size:0.82rem; font-weight:700; letter-spacing:1px;
}
.timer-bar span { color:var(--ghs-gold); font-size:1rem; }

/* ====== SCORE DONUT ====== */
.donut-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:12px; }
.donut-card { 
  background:white; border-radius:10px; padding:14px 10px;
  text-align:center; box-shadow:var(--shadow);
  cursor:pointer; transition:transform 0.2s;
}
.donut-card:hover { transform:translateY(-2px); }
.donut-card svg { overflow:visible; }
.donut-title { font-size:0.72rem; color:var(--gray); font-weight:700; margin-top:6px; }
.donut-score { font-size:0.75rem; font-weight:700; color:var(--ghs-dark); }

/* ====== LIVE FEED PANEL ====== */
.feed-item {
  display:flex; align-items:center; gap:10px; padding:8px 12px;
  border-radius:8px; background:#f8f9fa; margin-bottom:6px;
  border-left:3px solid var(--ghs-green);
  animation:slideIn 0.4s ease;
}
.feed-item.new { border-left-color:var(--ghs-gold); background:#fffdf0; }
.feed-time { font-size:0.72rem; color:var(--gray); white-space:nowrap; }
.feed-text { font-size:0.82rem; flex:1; }

/* ====== PERCENT RING (SVG inline) ====== */
.pct-ring { display:inline-flex; align-items:center; gap:6px; }

/* ====== ASSESSOR STATUS GRID ====== */
.assessor-status-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; }
.assessor-status-card {
  background:white; border-radius:10px; padding:14px;
  box-shadow:var(--shadow); text-align:center;
  border-top:4px solid var(--border);
}
.assessor-status-card.active   { border-top-color:#27ae60; }
.assessor-status-card.partial  { border-top-color:var(--ghs-gold); }
.assessor-status-card.inactive { border-top-color:#dee2e6; }
.assessor-avatar { 
  width:44px; height:44px; border-radius:50%; 
  background:var(--ghs-light); color:var(--ghs-green);
  display:flex; align-items:center; justify-content:center;
  font-size:1.2rem; margin:0 auto 8px;
}
</style>
</head>
<body>

<!-- ====== LOGIN PAGE ====== -->
<div id="loginPage">
  <div class="login-card">
    <div class="login-header">
      <!-- GHS Logo SVG -->
      <svg class="login-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="48" fill="#006633" stroke="#FFB800" stroke-width="3"/>
        <rect x="44" y="20" width="12" height="60" fill="white"/>
        <rect x="20" y="44" width="60" height="12" fill="white"/>
        <circle cx="50" cy="50" r="12" fill="#FFB800"/>
        <path d="M36 36 L50 28 L64 36 L64 50 L50 58 L36 50 Z" fill="none" stroke="white" stroke-width="1.5"/>
      </svg>
      <h1>GHANA HEALTH SERVICE</h1>
      <p>Institutional Care Division</p>
      <p style="font-size:0.82rem;color:#555;margin-top:6px">Health Facility Peer Review Assessment Platform</p>
      <span class="year-badge">2026 EDITION</span>
    </div>

//  AUTOMATIC USER CREATION via Identity Toolkit REST API
//  Creates a Firebase Auth account WITHOUT signing out the admin,
//  and returns the new user's UID for immediate profile linking.
// ══════════════════════════════════════════════════════════════
async function createAuthUserViaREST(email, password) {
  const res = await fetch(
    `https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${FIREBASE_CONFIG.apiKey}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, returnSecureToken: true })
    }
  );
  const data = await res.json();
  if(!res.ok) {
    const msg = data?.error?.message || 'Unknown error';
    if(msg.includes('EMAIL_EXISTS')) throw new Error('An account with this email already exists.');
    if(msg.includes('WEAK_PASSWORD')) throw new Error('Password must be at least 6 characters.');
    if(msg.includes('INVALID_EMAIL')) throw new Error('Invalid email address.');
    throw new Error(msg);
  }
  return data.localId; // this is the UID
}

window.doLogin = async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  document.getElementById('loginErr').textContent = '';
  try {
    const cred = await signInWithEmailAndPassword(auth, email, pass);
    // Profile loaded via onAuthStateChanged
  } catch(e) {
    document.getElementById('loginErr').textContent = 
      e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found'
        ? 'Invalid email or password.' : e.message;

onAuthStateChanged(auth, async user => {
  if(user) {
    currentUser = user;
    const snap = await get(ref(db, `users/${user.uid}`));
    userProfile = snap.val();
    if(!userProfile) {
      toast('Account not configured. Contact admin.','error');
      await signOut(auth); return;
    }
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('appShell').style.display = 'flex';
    buildApp();
  } else {
    currentUser = null; userProfile = null;
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('appShell').style.display = 'none';
    document.getElementById('pagesContainer').innerHTML = '';
    document.getElementById('navTabs').innerHTML = '';
  }
});

function refreshSAOverview() {
  get(ref(db,'facilities')).then(snap=>{
    facilitiesCache = snap.val()||{};
    const facs = Object.entries(facilitiesCache);
    
    let totalFac=facs.length, totalAbove70=0, totalAbove50=0, totalBelow50=0, allPct=[];
    const modTotals = {};
    for(let m=1;m<=9;m++) modTotals[m]={sum:0,count:0};

    facs.forEach(([fid,fac])=>{
      const scores = fac.scores||{};
      let total=0,max=0;
      for(let m=1;m<=9;m++){
        const ms=getModuleScore(scores,m);
        total+=ms; max+=MODULES[m].maxScore;
        modTotals[m].sum+=ms; modTotals[m].count++;
      }
      const pct=max?Math.round(total/max*100):0;
      allPct.push(pct);
      if(pct>=70) totalAbove70++;
      else if(pct>=50) totalAbove50++;
      else totalBelow50++;
    });

    const avgPct = allPct.length ? Math.round(allPct.reduce((a,b)=>a+b,0)/allPct.length) : 0;

    const kpis = document.getElementById('sa-kpis');
    if(kpis) kpis.innerHTML = `
      <div class="kpi-card"><div class="kpi-val">${totalFac}</div><div class="kpi-label">Total Facilities</div></div>
      <div class="kpi-card gold"><div class="kpi-val">${avgPct}%</div><div class="kpi-label">Average Score</div></div>
      <div class="kpi-card"><div class="kpi-val">${totalAbove70}</div><div class="kpi-label">High Performing (≥70%)</div></div>
      <div class="kpi-card"><div class="kpi-val">${totalAbove50}</div><div class="kpi-label">Average (50-69%)</div></div>
      <div class="kpi-card red"><div class="kpi-val">${totalBelow50}</div><div class="kpi-label">Under-performing (<50%)</div></div>`;

    // Module bar chart
    const mc = document.getElementById('sa-modchart');
    if(mc){
      mc.innerHTML = Object.entries(modTotals).map(([m,v])=>{
        const avg = v.count?Math.round(v.sum/v.count/MODULES[m].maxScore*100):0;
        const cls = avg>=70?'progress-high':avg>=50?'progress-med':'progress-low';
        return `<div class="chart-bar-row">
          <span class="chart-label">M${m}: ${MODULES[m].name.substring(0,20)}</span>
          <div class="chart-track"><div class="chart-fill ${cls}" style="width:${avg}%"><span>${avg}%</span></div></div>
          <span class="chart-num" style="color:${avg>=70?'#27ae60':avg>=50?'#e67e22':'#c0392b'}">${avg}%</span>
        </div>`;
      }).join('');
    }

    // Facility status list
    const fs = document.getElementById('sa-facstatus');
    if(fs){
      if(!facs.length){fs.innerHTML='<div class="empty-state"><div class="icon">🏥</div><p>No facilities yet</p></div>';return;}
      const sorted = facs.map(([fid,fac])=>{
        const scores=fac.scores||{};
        let total=0,max=0;
        for(let m=1;m<=9;m++){total+=getModuleScore(scores,m);max+=MODULES[m].maxScore;}
        return {fid,fac,pct:max?Math.round(total/max*100):0};
      }).sort((a,b)=>b.pct-a.pct).slice(0,8);
      fs.innerHTML = sorted.map(({fid,fac,pct})=>`
        <div class="flex-between" style="padding:8px 0;border-bottom:1px solid #eee">
          <div>
            <div class="fw-bold text-sm">${fac.name}</div>
            <div class="text-muted" style="font-size:0.75rem">${fac.type||''}</div>
          </div>
          <div style="text-align:right;min-width:120px">
            <div class="score-badge ${pct>=70?'score-high':pct>=50?'score-med':'score-low'}">${pct}%</div>
            <div class="progress mt-8" style="width:100px;display:inline-block">
              <div class="progress-bar ${pct>=70?'progress-high':pct>=50?'progress-med':'progress-low'}" style="width:${pct}%"></div>
            </div>
          </div>
        </div>`).join('');
    }

    // Full table
    const tb = document.getElementById('sa-alltable');
    if(tb){
      tb.innerHTML = facs.map(([fid,fac],i)=>{
        const scores=fac.scores||{};
        let total=0,max=0;
        const mCells = [];
        for(let m=1;m<=9;m++){
          const ms=getModuleScore(scores,m);
          total+=ms; max+=MODULES[m].maxScore;
          const mpct=Math.round(ms/MODULES[m].maxScore*100);
          mCells.push(`<td><span class="score-badge ${mpct>=70?'score-high':mpct>=50?'score-med':'score-low'}">${ms.toFixed(1)}</span></td>`);
        }
        const pct=max?Math.round(total/max*100):0;
        return `<tr>
          <td>${i+1}</td>
          <td class="fw-bold">${fac.name}</td>
          <td>${fac.location||'–'}</td>
          <td>${fac.type||'–'}</td>
          ${mCells.join('')}
          <td class="fw-bold">${total.toFixed(1)}</td>
          <td><span class="score-badge ${pct>=70?'score-high':pct>=50?'score-med':'score-low'}">${pct}%</span></td>
          <td>${pct>=70?'🟢 High':pct>=50?'🟡 Average':'🔴 Under'}</td>
        </tr>`;
      }).join('');
    }
  });
}

  return `<span style="font-family:monospace" id="${id}">••••••••</span>

}

window.createUser = async function() {
  const name=document.getElementById('uName').value.trim();
  const email=document.getElementById('uEmail').value.trim();
  const pass=document.getElementById('uPass').value;
  const role=document.getElementById('uRole').value;
  const moduleAssigned=Array.from(document.querySelectorAll('.uModuleCheck:checked')).map(c=>parseInt(c.value));
  const facilityId=document.getElementById('uFacility').value;
  if(!name||!email||!pass){ toast('All fields required','error'); return; }
  if(pass.length < 6){ document.getElementById('createUserErr').textContent='Password must be at least 6 characters.'; return; }
  const btn = document.querySelector('#modalContent .btn-primary');
  if(btn){ btn.disabled=true; btn.textContent='Creating account...'; }
  try {
    const uid = await createAuthUserViaREST(email, pass);
    await set(ref(db,`users/${uid}`), {
      name, email, password: pass, role,
      moduleAssigned: role==='assessor' ? moduleAssigned : null,
      facilityId: facilityId||null,
      createdAt: Date.now()
    });
    toast(`✅ ${name}'s account created and ready to use! They can log in immediately with ${email}.`);
    closeModal(); loadUsersTable();
  } catch(e){
    document.getElementById('createUserErr').textContent = e.message;
  } finally {
    if(btn){ btn.disabled=false; btn.textContent='🔐 Create Account'; }
  }
};

window.deleteUser = async function(uid) {
  if(!confirm('Delete this user?')) return;
  await remove(ref(db,`users/${uid}`));
  toast('User removed'); loadUsersTable();
};

window.onScoreInput = function(el, itemNo, maxScore, moduleId) {
  const v = parseFloat(el.value);
  if(isNaN(v)||v<0){ el.classList.remove('filled','over'); return; }
  if(v>maxScore){ el.classList.add('over'); el.classList.remove('filled'); }
  else { el.classList.remove('over'); el.classList.add('filled'); }
  updateSummary(moduleId);
};

window.autoSaveScore = async function(itemNo, maxScore, moduleId) {
  const inp = document.getElementById(`inp_m${moduleId}_${itemNo.replace(/\./g,'_')}`);
  if(!inp) return;
  const v = parseFloat(inp.value);
  if(isNaN(v)||v<0||v>maxScore) return;
  await update(ref(db,`facilities/${activeFacilityId}/scores/m${moduleId}`),{[dbKey(itemNo)]:v});
  toast(`✅ Saved: ${itemNo} = ${v}`);
};

window.submitAllScores = async function(moduleId) {
  const mod = MODULES[moduleId];
  const data = {};
  let hasError = false;
  mod.sections.forEach(sec=>sec.items.forEach(it=>{
    const inp = document.getElementById(`inp_m${moduleId}_${it.no.replace(/\./g,'_')}`);
    if(inp&&inp.value!==''){
      const v = parseFloat(inp.value);
      if(!isNaN(v)&&v>=0&&v<=it.score) data[dbKey(it.no)]=v;
      else hasError=true;
    }
  }));
  if(hasError){ toast('Some scores exceed the maximum. Fix them first.','error'); return; }
  await update(ref(db,`facilities/${activeFacilityId}/scores/m${moduleId}`), data);
  toast(`✅ Module ${moduleId} scores submitted!`);
};

function updateSummary(moduleId) {
  const mod = MODULES[moduleId];
  let total=0, itemsDone=0;
  mod.sections.forEach(sec=>sec.items.forEach(it=>{
    const inp=document.getElementById(`inp_m${moduleId}_${it.no.replace(/\./g,'_')}`);
    if(inp&&inp.value!==''){
      const v=parseFloat(inp.value);
      if(!isNaN(v)&&v>=0){ total+=v; itemsDone++; }
    }
  }));
  const el_t=document.getElementById(`as-total-score-${moduleId}`);
  const el_p=document.getElementById(`as-pct-score-${moduleId}`);
  const el_i=document.getElementById(`as-items-done-${moduleId}`);
  if(el_t) el_t.textContent=total.toFixed(1);
  if(el_p) el_p.textContent=Math.round(total/mod.maxScore*100)+'%';
  if(el_i) el_i.textContent=itemsDone;
}

function setupLiveListeners() {

  const unsub = onValue(ref(db,'facilities'), snap=>{
    facilitiesCache = snap.val()||{};
    // Refresh visible page
    const activePage = document.querySelector('.page.active');

    else if(pid==='sa-leaderboard') refreshLeaderboard();

}

// ══════════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════════
function getModuleScore(scores, m) {
  const mod = MODULES[m];
  const ms = scores[`m${m}`]||{};
  return mod.sections.flatMap(s=>s.items).reduce((sum,it)=>sum+(ms[dbKey(it.no)]||0),0);
}

// Firebase Realtime Database keys cannot contain '.', '#', '$', '[', ']', '/'
// Item numbers like "A1.1" or "2.6.7" must be sanitized before use as a DB key.
function dbKey(itemNo) {
  return String(itemNo).replace(/[.#$\[\]\/]/g, '_');
}

// Normalize moduleAssigned (string, number, or array) to an array of numeric module IDs
function getAssignedModules(u) {
  if(!u || u.moduleAssigned==null) return [];
  const raw = u.moduleAssigned;
  const arr = Array.isArray(raw) ? raw : [raw];
  return arr.map(x=>parseInt(x)).filter(x=>MODULES[x]);
}

function formatModuleList(u) {
  const mods = getAssignedModules(u);
  if(!mods.length) return '–';
  return mods.map(m=>`M${m}: ${MODULES[m].name}`).join(', ');
}

  `).join('');
  
  const pc = document.getElementById('pagesContainer');
  pc.innerHTML = tabs.map(t=>`<div class="page ${t.id===defaultId?'active':''}" id="${t.id}"></div>`).join('');

// ── Assessment Session Timer ──
let sessionStart = null;
function startSessionTimer() {
  sessionStart = Date.now();
  const bar = document.getElementById('timerBar');
  if(bar) {
    setInterval(()=>{
      const elapsed = Math.floor((Date.now()-sessionStart)/1000);
      const h = Math.floor(elapsed/3600).toString().padStart(2,'0');
      const m = Math.floor((elapsed%3600)/60).toString().padStart(2,'0');
      const s = (elapsed%60).toString().padStart(2,'0');
      const el = document.getElementById('timerClock');
      if(el) el.textContent = `${h}:${m}:${s}`;
    }, 1000);

}

// ── Donut SVG ──
function makeDonut(pct, size=80, color) {
  const r = 28, cx = size/2, cy = size/2;
  const circ = 2*Math.PI*r;
  const dash = (pct/100)*circ;
  const col = color || (pct>=70?'#27ae60':pct>=50?'#f39c12':'#e74c3c');
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#e9ecef" stroke-width="8"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${col}" stroke-width="8"
      stroke-dasharray="${dash} ${circ}" stroke-linecap="round"
      transform="rotate(-90 ${cx} ${cy})" style="transition:stroke-dasharray 0.8s ease"/>
    <text x="${cx}" y="${cy+1}" text-anchor="middle" dominant-baseline="middle"
      font-size="12" font-weight="800" fill="${col}">${pct}%</text>
  </svg>`;
}

    });
    container.innerHTML = `<div class="donut-grid">${Object.entries(MODULES).map(([m,mod])=>{
      const avg = Math.round(modAvg[m]/facCount/mod.maxScore*100);

// ── Export to CSV ──
window.exportCSV = function() {
  get(ref(db,'facilities')).then(snap=>{
    const facs = snap.val()||{};
    const rows = [['Facility','Type','District',...Object.values(MODULES).map(m=>'M'+Object.keys(MODULES).find(k=>MODULES[k]===m)+' Score'),'Total','Max','Percent']];
    Object.values(facs).forEach(fac=>{
      const scores=fac.scores||{};
      let total=0,max=0;
      const mScores=[];
      for(let m=1;m<=9;m++){
        const ms=getModuleScore(scores,m);
        mScores.push(ms.toFixed(1));
        total+=ms; max+=MODULES[m].maxScore;
      }
      rows.push([fac.name,fac.type||'',fac.location||'',...mScores,total.toFixed(1),max,Math.round(total/max*100)+'%']);
    });
    const csv = rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
    const blob = new Blob([csv],{type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download='GHS_PeerReview_2026_Results.csv'; a.click();
    URL.revokeObjectURL(url);
    toast('✅ CSV exported');
  });
};

// ── Assessor Status Grid for Supervisor Dashboard ──
window.renderAssessorStatusGrid = function(containerId) {
  if(!activeFacilityId) return;
  Promise.all([
    get(ref(db,'users')),
    get(ref(db,`facilities/${activeFacilityId}/scores`))
  ]).then(([usersSnap, scoresSnap])=>{
    const users = usersSnap.val()||{};
    const scores = scoresSnap.val()||{};
    const container = document.getElementById(containerId);
    if(!container) return;
    const assessors = Object.entries(users).filter(([,u])=>u.facilityId===activeFacilityId && u.role==='assessor');
    if(!assessors.length){
      container.innerHTML='<div class="empty-state"><div class="icon">👥</div><p>No assessors assigned yet</p></div>';
      return;
    }
    container.innerHTML = assessors.map(([uid,u])=>{
      const modIds = getAssignedModules(u);
      if(!modIds.length) return '';
      let scored=0, total=0, score=0, maxScore=0;
      modIds.forEach(modId=>{
        const modScores = scores[`m${modId}`]||{};
        const items = MODULES[modId].sections.flatMap(s=>s.items);
        scored += items.filter(it=>modScores[dbKey(it.no)]!=null).length;
        total += items.length;
        score += getModuleScore(scores, modId);
        maxScore += MODULES[modId].maxScore;
      });
      const pct = total ? Math.round(scored/total*100) : 0;
      const status = scored===0?'inactive':scored===total?'active':'partial';
      const scorePct = maxScore ? Math.round(score/maxScore*100) : 0;
      const icons = modIds.map(m=>MODULES[m].icon).join('');
      const modLabel = modIds.map(m=>'M'+m).join(', ');
      return `<div class="assessor-status-card ${status}">
        <div class="assessor-avatar">${icons}</div>
        <div class="fw-bold text-sm" style="margin-bottom:4px">${u.name}</div>
        <div class="text-muted" style="font-size:0.72rem;margin-bottom:8px">${modLabel}</div>
        ${makeDonut(scorePct, 60)}
        <div style="font-size:0.72rem;margin-top:6px;color:var(--gray)">${scored}/${total} items</div>
        <div class="progress mt-8" style="height:4px">
          <div class="progress-bar ${pct>=100?'progress-high':pct>=50?'progress-med':'progress-low'}" style="width:${pct}%"></div>
        </div>
      </div>`;
    }).join('');
  });
};

// ── Enhanced Assessor Form with auto-colour ──
window.onScoreInput = function(el, itemNo, maxScore, moduleId) {
  const v = parseFloat(el.value);
  el.classList.remove('s-excellent','s-good','s-poor','s-over','filled','over');
  if(isNaN(v)||el.value==='') return;
  if(v < 0 || v > maxScore) {
    el.classList.add('s-over');
    toast(`⚠️ Score for ${itemNo} cannot exceed ${maxScore}`,'warning');
    return;
  }
  const pct = v/maxScore*100;
  if(pct >= 70) el.classList.add('s-excellent');
  else if(pct >= 40) el.classList.add('s-good');
  else el.classList.add('s-poor');
  // Mark parent row
  const row = document.getElementById(`row_m${moduleId}_${itemNo.replace(/\./g,'_')}`);
  if(row){ row.classList.toggle('completed', pct>=50); row.classList.toggle('needs-attention', pct<50); }
  updateSummary(moduleId);
};

// ── Improved autoSave with visual dot ──
window.autoSaveScore = async function(itemNo, maxScore, moduleId) {
  const inp = document.getElementById(`inp_m${moduleId}_${itemNo.replace(/\./g,'_')}`);
  if(!inp || inp.value==='') return;
  const v = parseFloat(inp.value);
  if(isNaN(v)||v<0||v>maxScore) return;
  // Show saving dot
  inp.title = 'Saving...';
  try {
    await update(ref(db,`facilities/${activeFacilityId}/scores/m${moduleId}`),{[dbKey(itemNo)]:v});
    inp.title = `Saved: ${v}`;
    addFeedItem(`✏️ ${userProfile?.name||'Assessor'} scored ${itemNo} = ${v} pts`);
    // Update section score in header
    updateSectionScore(moduleId);
  } catch(e) {
    toast(`Failed to save ${itemNo}`,'error');
  }
};

function updateSectionScore(moduleId) {
  const mod = MODULES[moduleId];
  if(!mod) return;
  mod.sections.forEach((sec,si)=>{
    let secTotal=0, secMax=0;
    sec.items.forEach(it=>{
      const inp=document.getElementById(`inp_m${moduleId}_${it.no.replace(/\./g,'_')}`);
      secMax+=it.score;
      if(inp&&inp.value!==''){const v=parseFloat(inp.value);if(!isNaN(v)&&v>=0) secTotal+=v;}
    });
    const pct=Math.round(secTotal/secMax*100);
    const badge=document.getElementById(`sec_badge_${moduleId}_${si}`);
    if(badge) badge.textContent=`${secTotal.toFixed(1)}/${secMax} (${pct}%)`;
  });
  updateSummary(moduleId);
}

// ── Improved section rendering with score badge in title ──
function renderAssessorSections(moduleId, existing) {
  const mod = MODULES[moduleId];
  const container = document.getElementById(`as-sections-${moduleId}`);
  if(!container) return;
  container.innerHTML = mod.sections.map((sec,si)=>{
    const secMax = sec.items.reduce((s,it)=>s+it.score,0);
    const secCurrent = sec.items.reduce((s,it)=>s+(existing[dbKey(it.no)]||0),0);
    const secPct = Math.round(secCurrent/secMax*100);
    return `<div class="section-block">
      <div class="section-title" onclick="toggleSection('sec${moduleId}_${si}')">
        <span>${sec.title}</span>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="section-score" id="sec_badge_${moduleId}_${si}">${secCurrent.toFixed(1)}/${secMax} (${secPct}%)</span>
          <span id="arr_sec${moduleId}_${si}">▼</span>
        </div>
      </div>
      <div class="section-body open" id="sec${moduleId}_${si}">
        ${sec.items.map(it=>{
          const safeNo = `m${moduleId}_${it.no.replace(/\./g,'_')}`;
          const val = existing[dbKey(it.no)]??'';
          const pct = typeof existing[dbKey(it.no)]==='number'?(existing[dbKey(it.no)]/it.score*100):null;
          let cls = '';
          if(pct!==null){ cls = pct>=70?'s-excellent':pct>=40?'s-good':'s-poor'; }
          const rowCls = pct!==null?(pct>=50?'completed':'needs-attention'):'';
          return `<div class="item-row ${rowCls}" id="row_${safeNo}">
            <div><span class="item-no">${it.no}</span></div>
            <div class="item-info">
              <h4>${it.item}</h4>
              <p>${it.criteria}</p>
            </div>
            <div class="item-scoring">
              <div class="expected-score">Max: <b>${it.score}</b></div>
              <input type="number" class="score-input ${cls}"
                id="inp_${safeNo}"
                value="${val}"
                min="0" max="${it.score}" step="0.5"
                placeholder="0–${it.score}"
                oninput="onScoreInput(this,'${it.no}',${it.score},${moduleId})"
                onchange="autoSaveScore('${it.no}',${it.score},${moduleId})"/>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
  updateSummary(moduleId);
}

    <input class="search-bar" id="facCardSearch" placeholder="🔍 Search facilities..." oninput="filterFacilityCards()"/>
    <div id="fac-cards" class="facility-grid"></div>`;
  loadFacilityCards();
}

window.filterFacilityCards = function() {
  const q = document.getElementById('facCardSearch')?.value.toLowerCase()||'';
  document.querySelectorAll('.facility-card').forEach(card=>{
    card.style.display = card.textContent.toLowerCase().includes(q)?'':'none';
  });
};

// ── SA Reports Enhanced ──
function buildSAReports() {
  const p = getPage('sa-reports');
  p.innerHTML = `
    <div class="card">
      <div class="card-header">
        <span class="card-title">📊 Greater Accra – Peer Review Summary Report 2026</span>
        <div style="display:flex;gap:8px">
          <button class="btn btn-export btn-sm" onclick="exportCSV()">📥 Download CSV</button>
          <button class="btn btn-gold btn-sm" onclick="printScorecard()">🖨️ Print</button>
        </div>
      </div>
      <div id="sa-report-kpis" class="kpi-grid" style="margin-bottom:20px"></div>
      <div id="sa-module-breakdown" style="margin-bottom:20px"></div>
      <div id="reports-content"></div>
    </div>`;
  get(ref(db,'facilities')).then(snap=>{
    const facs = snap.val()||{};
    const container=document.getElementById('reports-content');
    const kpiC=document.getElementById('sa-report-kpis');
    const modC=document.getElementById('sa-module-breakdown');
    if(!container) return;
    const data = Object.entries(facs).map(([fid,fac])=>{
      const scores=fac.scores||{};
      const modScores={};
      let total=0,max=0;
      for(let m=1;m<=9;m++){
        const ms=getModuleScore(scores,m);
        modScores[m]=ms; total+=ms; max+=MODULES[m].maxScore;
      }
      return {name:fac.name,type:fac.type,location:fac.location,modScores,total,max,pct:max?Math.round(total/max*100):0};
    }).sort((a,b)=>b.pct-a.pct);
    if(!data.length){container.innerHTML='<div class="empty-state"><div class="icon">📊</div><p>No data yet</p></div>';return;}
    // KPIs
    const avg=Math.round(data.reduce((s,d)=>s+d.pct,0)/data.length);
    const high=data.filter(d=>d.pct>=70).length;
    const med=data.filter(d=>d.pct>=50&&d.pct<70).length;
    const low=data.filter(d=>d.pct<50).length;
    if(kpiC) kpiC.innerHTML=`
      <div class="kpi-card gold"><div class="kpi-val">${avg}%</div><div class="kpi-label">Regional Average</div></div>
      <div class="kpi-card"><div class="kpi-val">${data.length}</div><div class="kpi-label">Facilities Assessed</div></div>
      <div class="kpi-card"><div class="kpi-val">${high}</div><div class="kpi-label">🟢 High (≥70%)</div></div>
      <div class="kpi-card"><div class="kpi-val">${med}</div><div class="kpi-label">🟡 Average (50-69%)</div></div>
      <div class="kpi-card red"><div class="kpi-val">${low}</div><div class="kpi-label">🔴 Under-performing</div></div>`;
    // Module bar chart across all facilities
    if(modC){
      const modAvgPcts = {};
      for(let m=1;m<=9;m++){
        const avg2=Math.round(data.reduce((s,d)=>s+d.modScores[m],0)/data.length/MODULES[m].maxScore*100);
        modAvgPcts[m]=avg2;
      }
      modC.innerHTML=`<h3 style="color:var(--ghs-dark);margin-bottom:12px">Regional Module Averages</h3>`+
        Object.entries(modAvgPcts).map(([m,avg2])=>`
          <div class="chart-bar-row">
            <span class="chart-label">${MODULES[m].icon} M${m}: ${MODULES[m].name.substring(0,22)}</span>
            <div class="chart-track"><div class="chart-fill ${avg2>=70?'progress-high':avg2>=50?'progress-med':'progress-low'}" style="width:${avg2}%"><span>${avg2}%</span></div></div>
            <span class="chart-num" style="color:${avg2>=70?'#27ae60':avg2>=50?'#e67e22':'#c0392b'}">${avg2}%</span>
          </div>`).join('');
    }
    container.innerHTML=`<div style="overflow-x:auto"><table>
      <thead><tr>
        <th>Rank</th><th>Facility</th><th>Type</th><th>District</th>
        ${Object.entries(MODULES).map(([m,d])=>`<th title="${d.name}">${d.icon}M${m}</th>`).join('')}
        <th>Total</th><th>%</th><th>Performance</th>
      </tr></thead>
      <tbody>${data.map((d,i)=>`<tr>
        <td><b>${i+1}</b></td>
        <td class="fw-bold">${d.name}</td>
        <td>${d.type||'–'}</td><td>${d.location||'–'}</td>
        ${Object.entries(MODULES).map(([m])=>{const pct2=Math.round(d.modScores[m]/MODULES[m].maxScore*100);return`<td><span class="score-badge ${pct2>=70?'score-high':pct2>=50?'score-med':'score-low'}">${d.modScores[m].toFixed(0)}</span></td>`;}).join('')}
        <td class="fw-bold">${d.total.toFixed(1)}</td>
        <td><b>${d.pct}%</b></td>
        <td>${d.pct>=70?'🟢 High':d.pct>=50?'🟡 Average':'🔴 Under'}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  });
}
</script>
